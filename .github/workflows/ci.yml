name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build (compile grammars)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit + E2E tests
        run: npm test

      - name: Language grammar zoo tests
        run: npm run test:languages
