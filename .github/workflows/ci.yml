name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 25

      - run: npm ci

      - name: Build (compile grammars)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit + E2E tests
        run: npm test

      - name: Language grammar zoo tests
        run: npm run test:languages
